<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>宇都宮ブレックス 2026-2027 カレンダー</title>
  <style>
    :root {
      --bg1: #0b1020;
      --bg2: #111a33;
      --glass: rgba(255, 255, 255, 0.08);
      --text: #eaf0ff;
      --muted: #a7b0ca;
      --line: rgba(255, 255, 255, 0.16);
      --accent: #7aa2ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background:
        radial-gradient(1200px 700px at 10% -10%, #1f3b7a 0%, transparent 55%),
        radial-gradient(1000px 600px at 110% 110%, #4a2478 0%, transparent 52%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      padding: 28px 14px;
      overflow-x: hidden;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── ヘッダー ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .page-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .page-title small {
      font-size: 13px;
      font-weight: 400;
      color: var(--muted);
      margin-left: 8px;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border: 1px solid rgba(122,162,255,0.4);
      border-radius: 999px;
      transition: background 0.15s;
    }
    .nav-link:hover { background: rgba(122,162,255,0.12); }

    /* ── 月ナビ ── */
    .month-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 28px;
    }

    .month-nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .month-nav a:hover {
      color: var(--accent);
      border-color: rgba(122,162,255,0.5);
      background: rgba(122,162,255,0.08);
    }

    /* ── 月セクション ── */
    .month-section {
      margin-bottom: 36px;
      scroll-margin-top: 16px;
    }

    .month-title {
      font-size: 13px;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
      padding: 0 2px;
    }

    /* ── カレンダーグリッド ── */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }

    .cal-header {
      text-align: center;
      padding: 6px 4px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .cal-header.sat { color: #4da3ff; }
    .cal-header.sun { color: #ff6b6b; }

    /* ── 日付セル ── */
    .cal-cell {
      min-height: 90px;
      padding: 8px 6px 6px;
      background: rgba(255,255,255,0.025);
      border-radius: 8px;
      border: 1px solid transparent;
    }

    .cal-cell.empty {
      background: transparent;
      border-color: transparent;
    }

    .cal-cell.has-game {
      background: rgba(255,255,255,0.055);
      border-color: var(--line);
    }

    .cal-date {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .cal-cell.day-sat .cal-date { color: #4da3ff; }
    .cal-cell.day-sun .cal-date { color: #ff6b6b; }

    /* ── 試合情報 ── */
    .game-item {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 1px 6px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .home { background: #FFD400; color: #12315A; }
    .away { background: #ffffff; color: #12315A; border: 1px solid #12315A; }

    .team-logo {
      height: 20px;
      width: auto;
      object-fit: contain;
      flex-shrink: 0;
      border-radius: 2px;
    }

    .opp {
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    /* ── モバイル ── */
    @media (max-width: 640px) {
      body { padding: 16px 10px; }
      .page-title { font-size: 17px; }
      .cal-cell { min-height: 62px; padding: 6px 4px; }
      .cal-date { font-size: 11px; margin-bottom: 3px; }
      .badge { font-size: 9px; padding: 1px 4px; }
      .team-logo { height: 15px; }
      .opp { font-size: 10px; }
      .game-item { gap: 3px; }
    }
  </style>
</head>

    const teamShort = {

      "秋田ノーザンハピネッツ":        "秋田",

      "信州ブレイブウォリアーズ":      "信州",
      "川崎ブレイブサンダース":        "川崎",

      "琉球ゴールデンキングス":        "琉球",

      "アルティーリ千葉":              "A千葉",
    };

    const HOLIDAYS = new Set(["2027/2/11"]);

    function parseCSV(csv) {
      const lines = csv.trim().split("\n");
      const headers = lines[0].split(",");
      return lines.slice(1).map(line => {
        const cols = line.split(",");
        const obj = {};
        headers.forEach((h, i) => obj[h.trim()] = (cols[i] || "").trim());
        return obj;
      });
    }

    function buildCalendar(data) {
      const gameMap = {};
      data.forEach(row => {
        const d = row["日付"];
        if (!gameMap[d]) gameMap[d] = [];
        gameMap[d].push(row);
      });

      const months = [
        [2026,9],[2026,10],[2026,11],[2026,12],
        [2027,1],[2027,2],[2027,3],[2027,4],[2027,5]
      ];
      const DOW_NAMES = ["月","火","水","木","金","土","日"];
      const MONTH_NAMES = ["","1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

      // 月ナビ
      const navHtml = months.map(([y, m]) =>
        `<a href="#m-${y}-${m}">${y === 2026 ? "" : ""}${MONTH_NAMES[m]}</a>`
      ).join("");
      document.getElementById("monthNav").innerHTML = navHtml;

      let html = "";

      months.forEach(([year, month]) => {
        const daysInMonth = new Date(year, month, 0).getDate();
        const startDow = (new Date(year, month - 1, 1).getDay() + 6) % 7; // 0=Mon

        let cells = DOW_NAMES.map((name, i) => {
          const cls = i === 5 ? "cal-header sat" : i === 6 ? "cal-header sun" : "cal-header";
          return `<div class="${cls}">${name}</div>`;
        }).join("");

        // 月頭の空白
        for (let i = 0; i < startDow; i++) {
          cells += `<div class="cal-cell empty"></div>`;
        }

        for (let d = 1; d <= daysInMonth; d++) {
          const dateStr = `${year}/${month}/${d}`;
          const dow = (startDow + d - 1) % 7;
          const isSat = dow === 5;
          const isSun = dow === 6 || HOLIDAYS.has(dateStr);
          const games = gameMap[dateStr] || [];

          let cls = "cal-cell";
          if (isSat) cls += " day-sat";
          if (isSun) cls += " day-sun";
          if (games.length > 0) cls += " has-game";

          let content = `<div class="cal-date">${d}</div>`;
          games.forEach(g => {
            const kubun = g["区分"];
            const opp = g["対戦相手"];
            const short = teamShort[opp] || opp;
            const logo = teamLogos[opp] || "";
            const badgeCls = kubun === "HOME" ? "home" : "away";
            content += `<div class="game-item">
              <span class="badge ${badgeCls}">${kubun}</span>
              ${logo ? `<img class="team-logo" src="${logo}" alt="" loading="lazy" onerror="this.style.display='none'">` : ""}
              <span class="opp">${short}</span>
            </div>`;
          });

          cells += `<div class="${cls}">${content}</div>`;
        }

        // 月末の空白
        const total = startDow + daysInMonth;
        const rem = total % 7;
        if (rem > 0) {
          for (let i = 0; i < 7 - rem; i++) {
            cells += `<div class="cal-cell empty"></div>`;
          }
        }

        html += `<div class="month-section" id="m-${year}-${month}">
          <div class="month-title">${year}年${MONTH_NAMES[month]}</div>
          <div class="cal-grid">${cells}</div>
        </div>`;
      });

      return html;
    }

    const allData = parseCSV(CSV);
    document.getElementById("calendar").innerHTML = buildCalendar(allData);

</html>
