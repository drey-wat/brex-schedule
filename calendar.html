<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>宇都宮ブレックス 2026-2027 カレンダー</title>
  <style>
    :root {
      --bg1: #0b1020;
      --bg2: #111a33;
      --glass: rgba(255, 255, 255, 0.08);
      --text: #eaf0ff;
      --muted: #a7b0ca;
      --line: rgba(255, 255, 255, 0.16);
      --accent: #7aa2ff;
    }

    * { box-sizing: border-box; }

    html {
      background:
        radial-gradient(1200px 700px at 10% -10%, #1f3b7a 0%, transparent 55%),
        radial-gradient(1000px 600px at 110% 110%, #4a2478 0%, transparent 52%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      background-color: #0b1020;
    }

    body {
      margin: 0;
      color: var(--text);
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background:
        radial-gradient(1200px 700px at 10% -10%, #1f3b7a 0%, transparent 55%),
        radial-gradient(1000px 600px at 110% 110%, #4a2478 0%, transparent 52%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      padding: 28px 14px;
      overflow-x: hidden;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── ヘッダー ── */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .title { margin: 0; font-size: clamp(1.4rem, 2vw, 2rem); }
    .title small { font-size: 0.6em; font-weight: 400; color: var(--muted); margin-left: 4px; }
    .title-logo { height: 1.6em; width: auto; object-fit: contain; vertical-align: middle; margin-right: 6px; }

    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border: 1px solid rgba(122,162,255,0.4);
      margin-left: auto;
      border-radius: 999px;
      transition: background 0.15s;
    }
    .nav-link:hover { background: rgba(122,162,255,0.12); }

    /* ── 月ナビ ── */
    .month-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 28px;
    }

    .month-nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .month-nav a:hover {
      color: var(--accent);
      border-color: rgba(122,162,255,0.5);
      background: rgba(122,162,255,0.08);
    }

    /* ── 月セクション ── */
    .month-section {
      margin-bottom: 36px;
      scroll-margin-top: 16px;
    }

    .month-title {
      font-size: 13px;
      font-weight: 800;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
      padding: 0 2px;
    }

    /* ── カレンダーグリッド ── */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }

    .cal-header {
      text-align: center;
      padding: 6px 4px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .cal-header.sat { color: #4da3ff; }
    .cal-header.sun { color: #ff6b6b; }

    /* ── 日付セル ── */
    .cal-cell {
      min-height: 90px;
      padding: 8px 6px 6px;
      background: rgba(255,255,255,0.025);
      border-radius: 8px;
      border: 1px solid transparent;
      position: relative;
    }

    .cal-cell.empty {
      background: transparent;
      border-color: transparent;
    }

    .cal-cell.home-cell {
      background: #FFD400;
      border-color: #d4aa00;
    }
    .cal-cell.away-cell {
      background: #ffffff;
      border-color: rgba(0,0,0,0.15);
    }

    .cal-cell-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }

    .cal-kubun {
      font-size: 10px;
      font-weight: 800;
      color: #12315A;
      line-height: 1;
    }

    .cal-date {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .memo-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
      flex-shrink: 0;
      animation: memoDotPulse 2s ease-in-out infinite;
    }

    @keyframes memoDotPulse {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 0.9; }
    }
    .cal-cell.day-sat .cal-date { color: #4da3ff; }
    .cal-cell.day-sun .cal-date { color: #ff6b6b; }
    .cal-cell.home-cell .cal-date,
    .cal-cell.away-cell .cal-date { color: #12315A; }

    .team-logo-large {
      display: block;
      height: 50px;
      width: auto;
      max-width: 90%;
      object-fit: contain;
      margin: 2px auto 0;
    }

    /* ── モバイル ── */
    @media (max-width: 640px) {
      body { padding: 16px 10px; }
      .title { font-size: 1.05rem; }
      .cal-cell { min-height: 62px; padding: 6px 4px; }
      .cal-date { font-size: 11px; }
      .team-logo-large { height: 34px; }
      .cal-kubun { font-size: 0; }
      .cal-kubun::after { content: attr(data-short); font-size: 10px; }
    }

    /* ── モーダル ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }

    .modal {
      background: rgba(15, 27, 54, 0.97);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 28px 24px 24px;
      width: min(400px, 90vw);
      max-height: min(90svh, 90vh);
      overflow-y: auto;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      transform: translateY(12px);
      transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-close {
      position: absolute;
      top: 12px; right: 14px;
      background: none; border: none;
      color: var(--muted);
      font-size: 22px; cursor: pointer; line-height: 1; padding: 4px;
    }
    .modal-close:hover { color: var(--text); }

    .memo-section { margin-top: 14px; }
    .memo-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .modal-memo {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      min-height: 72px;
      outline: none;
      transition: border-color 0.15s;
      box-sizing: border-box;
    }
    .modal-memo:focus { border-color: rgba(122,162,255,0.5); }
    .modal-memo::placeholder { color: var(--muted); opacity: 0.6; }
    @media (max-width: 640px) { .modal-memo { font-size: 16px; } }

    .cal-cell.going-cell {
      box-shadow: inset 0 0 0 2px #ff4444;
    }

    .going-section {
      display: flex;
      align-items: center;
      padding: 12px 0 4px;
      border-top: 1px solid var(--line);
      margin-top: 4px;
    }
    .going-label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      user-select: none;
    }
    .going-label input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border: 2px solid var(--line);
      border-radius: 5px;
      background: rgba(255,255,255,0.06);
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .going-label input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .going-label input[type="checkbox"]:checked::after {
      content: "✓";
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #0b1020;
      font-size: 14px;
      font-weight: 900;
      line-height: 1;
    }

    .modal-row {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }
    .modal-row:last-child { border-bottom: none; }
    .modal-label {
      width: 60px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
    }
    .modal-value { color: var(--text); font-weight: 600; }
    .modal-opp { display: flex; align-items: center; gap: 8px; }
    .modal-logo { height: 28px; width: auto; object-fit: contain; }
    .badge {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 2px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 700;
    }
    .home { background: #FFD400; color: #12315A; }
    .away { background: #ffffff; color: #12315A; border: 1px solid #12315A; }

    /* スクロールトップボタン */
    .scroll-top {
      position: fixed;
      bottom: 24px;
      right: 20px;
      width: 44px;
      height: 44px;
      padding: 0;
      border-radius: 50%;
      background: var(--accent);
      color: #0b1020;
      font-size: 20px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    .scroll-top.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
  </style>
</head>

      const lines = csv.trim().split("\n");
      const headers = lines[0].split(",");
      return lines.slice(1).map(line => {
        const cols = line.split(",");
        const obj = {};
        headers.forEach((h, i) => obj[h.trim()] = (cols[i] || "").trim());
        return obj;
      });
    }

    function buildCalendar(data) {
      const gameMap = {};
      data.forEach(row => {
        const d = row["日付"];
        if (!gameMap[d]) gameMap[d] = [];
        gameMap[d].push(row);
      });

      const months = [
        [2026,9],[2026,10],[2026,11],[2026,12],
        [2027,1],[2027,2],[2027,3],[2027,4],[2027,5]
      ];
      const DOW_NAMES = ["月","火","水","木","金","土","日"];
      const MONTH_NAMES = ["","1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

      // 月ナビ
      const navHtml = months.map(([y, m]) =>
        `<a href="#m-${y}-${m}">${y === 2026 ? "" : ""}${MONTH_NAMES[m]}</a>`
      ).join("");
      document.getElementById("monthNav").innerHTML = navHtml;

      let html = "";

      months.forEach(([year, month]) => {
        const daysInMonth = new Date(year, month, 0).getDate();
        const startDow = (new Date(year, month - 1, 1).getDay() + 6) % 7; // 0=Mon

        let cells = DOW_NAMES.map((name, i) => {
          const cls = i === 5 ? "cal-header sat" : i === 6 ? "cal-header sun" : "cal-header";
          return `<div class="${cls}">${name}</div>`;
        }).join("");

        // 月頭の空白
        for (let i = 0; i < startDow; i++) {
          cells += `<div class="cal-cell empty"></div>`;
        }

        for (let d = 1; d <= daysInMonth; d++) {
          const dateStr = `${year}/${month}/${d}`;
          const dow = (startDow + d - 1) % 7;
          const isSat = dow === 5;
          const isSun = dow === 6 || HOLIDAYS.has(dateStr);
          const games = gameMap[dateStr] || [];

          let cls = "cal-cell";
          if (isSat) cls += " day-sat";
          if (isSun) cls += " day-sun";

          let content;
          let dataAttrs = "";
          if (games.length > 0) {
            const g = games[0];
            const kubun = g["区分"];
            const logo = teamLogos[g["対戦相手"]] || "";
            cls += kubun === "HOME" ? " home-cell" : " away-cell";
            const shortLabel = kubun === "HOME" ? "H" : "A";
            dataAttrs = ` data-date="${dateStr}" data-day="${g["曜日"]}" data-kubun="${kubun}" data-opponent="${g["対戦相手"]}" data-venue="${g["会場"]}" style="cursor:pointer"`;
            content = `<div class="cal-cell-top">
                <div class="cal-date">${d}</div>
                <span class="cal-kubun" data-short="${shortLabel}">${kubun}</span>
              </div>`;
            content += logo
              ? `<img class="team-logo-large" src="${logo}" alt="" loading="lazy" onerror="this.style.display='none'">`
              : "";
          } else {
            content = `<div class="cal-date">${d}</div>`;
          }

          cells += `<div class="${cls}"${dataAttrs}>${content}</div>`;
        }

        // 月末の空白
        const total = startDow + daysInMonth;
        const rem = total % 7;
        if (rem > 0) {
          for (let i = 0; i < 7 - rem; i++) {
            cells += `<div class="cal-cell empty"></div>`;
          }
        }

        html += `<div class="month-section" id="m-${year}-${month}">
          <div class="month-title">${year}年${MONTH_NAMES[month]}</div>
          <div class="cal-grid">${cells}</div>
        </div>`;
      });

      return html;
    }

    const PAGE_LOAD_TIME = Date.now();

    const allData = parseCSV(CSV);
    document.getElementById("calendar").innerHTML = buildCalendar(allData);

    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (!key) continue;
      if (key.startsWith("brex-going-")) addGoingMark(key.replace("brex-going-", ""));
      if (key.startsWith("brex-memo-") && localStorage.getItem(key)) {
        addMemoDot(key.replace("brex-memo-", ""));
      }
    }

    // ── モーダル ──
    const DAY_JP = { MON:"月", TUE:"火", WED:"水", THU:"木", FRI:"金", SAT:"土", SUN:"日" };
    const modalOverlay = document.getElementById("modalOverlay");
    const memoInput = document.getElementById("memoInput");
    const goingCheck = document.getElementById("goingCheck");
    let currentMemoKey = null;
    let currentDate = null;

    function openModal() {
      const scrollY = window.scrollY;
      document.body.dataset.scrollY = scrollY;
      document.body.style.position = "fixed";
      document.body.style.top = `-${scrollY}px`;
      document.body.style.width = "100%";
      modalOverlay.classList.add("open");
    }

    function closeModal() {
      const scrollY = parseInt(document.body.dataset.scrollY || "0", 10);
      document.body.style.position = "";
      document.body.style.top = "";
      document.body.style.width = "";
      window.scrollTo(0, scrollY);
      modalOverlay.classList.remove("open");
      currentMemoKey = null;
      currentDate = null;
    }

    function addGoingMark(date) {
      const cell = document.querySelector(`[data-date="${date}"]`);
      if (cell) cell.classList.add("going-cell");
    }

    function removeGoingMark(date) {
      const cell = document.querySelector(`[data-date="${date}"]`);
      if (cell) cell.classList.remove("going-cell");
    }

    function addMemoDot(date) {
      const cell = document.querySelector(`[data-date="${date}"]`);
      if (!cell || cell.querySelector(".memo-dot")) return;
      const dateEl = cell.querySelector(".cal-date");
      if (!dateEl) return;
      const dot = document.createElement("span");
      dot.className = "memo-dot";
      dot.style.animationDelay = `-${(Date.now() - PAGE_LOAD_TIME) % 2000}ms`;
      dateEl.appendChild(dot);
    }

    function removeMemoDot(date) {
      const cell = document.querySelector(`[data-date="${date}"]`);
      const dot = cell && cell.querySelector(".memo-dot");
      if (dot) dot.remove();
    }

    document.getElementById("calendar").addEventListener("click", e => {
      const cell = e.target.closest("[data-date]");
      if (!cell) return;
      const { date, day, kubun, opponent, venue } = cell.dataset;
      const [y, m, d] = date.split("/");
      const dateLabel = `${y}年${m}月${d}日`;
      const dayLabel  = `${DAY_JP[day] || day}（${day}）`;
      const badgeCls  = kubun === "HOME" ? "home" : "away";
      const logo      = teamLogos[opponent] || "";
      document.getElementById("modalBody").innerHTML = `
        <div class="modal-row">
          <span class="modal-label">日付</span>
          <span class="modal-value">${dateLabel}</span>
        </div>
        <div class="modal-row">
          <span class="modal-label">曜日</span>
          <span class="modal-value">${dayLabel}</span>
        </div>
        <div class="modal-row">
          <span class="modal-label">区分</span>
          <span class="modal-value"><span class="badge ${badgeCls}">${kubun}</span></span>
        </div>
        <div class="modal-row">
          <span class="modal-label">対戦相手</span>
          <span class="modal-value modal-opp">
            ${logo ? `<img class="modal-logo" src="${logo}" alt="" onerror="this.style.display='none'">` : ""}
            ${opponent}
          </span>
        </div>
        <div class="modal-row">
          <span class="modal-label">会場</span>
          <span class="modal-value">${venue}</span>
        </div>`;
      currentDate = date;
      currentMemoKey = `brex-memo-${date}`;
      memoInput.value = localStorage.getItem(currentMemoKey) || "";
      goingCheck.checked = localStorage.getItem(`brex-going-${date}`) === "1";
      openModal();
    });

    goingCheck.addEventListener("change", () => {
      if (!currentDate) return;
      if (goingCheck.checked) {
        localStorage.setItem(`brex-going-${currentDate}`, "1");
        addGoingMark(currentDate);
      } else {
        localStorage.removeItem(`brex-going-${currentDate}`);
        removeGoingMark(currentDate);
      }
    });

    memoInput.addEventListener("input", () => {
      if (!currentMemoKey) return;
      const val = memoInput.value;
      if (val) {
        localStorage.setItem(currentMemoKey, val);
        addMemoDot(currentDate);
      } else {
        localStorage.removeItem(currentMemoKey);
        removeMemoDot(currentDate);
      }
    });

    document.getElementById("modalClose").addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", e => { if (e.target === modalOverlay) closeModal(); });
    document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

    const scrollTopBtn = document.getElementById("scrollTopBtn");
    window.addEventListener("scroll", () => {
      scrollTopBtn.classList.toggle("visible", window.scrollY > 300);
    }, { passive: true });
    scrollTopBtn.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  </script>
</body>
</html>
