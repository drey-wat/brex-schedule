<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>宇都宮ブレックス2026-2027</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <style>
    :root {
      --bg1: #0b1020;
      --bg2: #111a33;
      --glass: rgba(255, 255, 255, 0.08);
      --text: #eaf0ff;
      --muted: #a7b0ca;
      --line: rgba(255, 255, 255, 0.16);
      --accent: #7aa2ff;
    }

    * { box-sizing: border-box; }

    html {
      background:
        radial-gradient(1200px 700px at 10% -10%, #1f3b7a 0%, transparent 55%),
        radial-gradient(1000px 600px at 110% 110%, #4a2478 0%, transparent 52%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      background-color: #0b1020;
    }

    body {
      margin: 0;
      color: var(--text);
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background:
        radial-gradient(1200px 700px at 10% -10%, #1f3b7a 0%, transparent 55%),
        radial-gradient(1000px 600px at 110% 110%, #4a2478 0%, transparent 52%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      padding: 28px 14px;
      overflow-x: hidden;
    }

    .container { max-width: 1320px; margin: 0 auto; }
    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .title { margin: 0; font-size: clamp(1.4rem, 2vw, 2rem); }
    .title small { font-size: 0.6em; font-weight: 400; color: var(--muted); margin-left: 4px; }
    .title-logo { height: 1.6em; width: auto; object-fit: contain; vertical-align: middle; margin-right: 6px; }
    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border: 1px solid rgba(122,162,255,0.4);
      margin-left: auto;
      border-radius: 999px;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .nav-link:hover { background: rgba(122,162,255,0.12); }

    .card {
      background: var(--glass);
      border: 1px solid var(--line);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
    }

    .filters {
      padding: 14px;
      margin-bottom: 12px;
      display: grid;
      grid-template-columns: repeat(7, minmax(140px, 1fr));
      gap: 10px;
    }

    .input-wrap { display: flex; flex-direction: column; gap: 6px; }

    .input-wrap label {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    input, select, button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.08);
      color: #f5f8ff;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }

    input::placeholder { color: #c3cbe2; opacity: .9; }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(122, 162, 255, 0.26);
    }

    select {
      background: rgba(10, 18, 36, 0.95);
      color: #f5f8ff;
      font-weight: 600;
    }

    select option {
      background-color: #0f1b36;
      color: #f5f8ff;
    }

    .check-wrap {
      justify-content: end;
    }

    .check-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #f5f8ff;
      font-weight: 600;
      line-height: 1.4;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      background: rgba(10, 18, 36, 0.95);
    }

    .check-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #7aa2ff;
      margin: 0;
      padding: 0;
    }

    .actions { display: flex; align-items: end; }

    .btn {
      width: 100%;
      cursor: pointer;
      font-weight: 700;
      transition: .2s;
    }

    .btn:hover {
      background: rgba(255,255,255,0.14);
      transform: translateY(-1px);
    }

    /* デスクトップではトグルバー非表示 */
    .filter-header { display: none; }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      margin: 8px 4px 10px;
      gap: 12px;
      flex-wrap: wrap;
      min-height: 32px;
    }

    .table-wrap { overflow: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
      table-layout: fixed;
    }

    thead th {
      position: sticky;
      top: 0;
      background: rgba(8, 14, 30, 0.92);
      z-index: 1;
      text-align: left;
      font-size: 13px;
      color: #c8d3f8;
      border-bottom: 1px solid var(--line);
      padding: 12px;
      letter-spacing: .03em;
    }

    tbody td {
      padding: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 14px;
    }

    tbody tr { transition: none; cursor: pointer; }
    .month-header { cursor: default; }

    .badge {
      display: inline-block;
      min-width: 62px;
      text-align: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
    }

    .home { background: #FFD400; color: #12315A; }
    .away { background: #ffffff; color: #12315A; border: 1px solid #12315A; }

    .day-sat { color: #4da3ff; font-weight: 700; }
    .day-sun { color: #ff6b6b; font-weight: 700; }

    .team-logo {
      height: 28px;
      width: auto;
      object-fit: contain;
      vertical-align: middle;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .empty {
      text-align: center;
      padding: 28px;
      color: var(--muted);
      display: none;
    }

    /* flatpickr dark */
    .flatpickr-calendar {
      background: #0f1b36;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    .flatpickr-months .flatpickr-month,
    .flatpickr-weekdays,
    .flatpickr-current-month .flatpickr-monthDropdown-months,
    .flatpickr-current-month input.cur-year,
    .flatpickr-day,
    span.flatpickr-weekday {
      color: #f5f8ff;
    }

    .flatpickr-current-month .flatpickr-monthDropdown-months {
      background: #0f1b36;
      font-weight: 600;
    }

    .flatpickr-current-month input.cur-year { font-weight: 600; }

    .flatpickr-prev-month svg,
    .flatpickr-next-month svg { fill: #f5f8ff; }

    .flatpickr-day.selected,
    .flatpickr-day.startRange,
    .flatpickr-day.endRange {
      background: #7aa2ff;
      border-color: #7aa2ff;
      color: #0b1020;
    }

    .flatpickr-day.today { border-color: #7aa2ff; }

    .flatpickr-day.flatpickr-disabled,
    .flatpickr-day.flatpickr-disabled:hover {
      color: rgba(245, 248, 255, 0.28);
    }

    /* 月見出し */
    .month-header td {
      padding: 20px 12px 4px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.12em;
      border: none;
    }

/* 検索マッチハイライト */
    mark.hl {
      background: rgba(255, 212, 0, 0.3);
      color: inherit;
      border-radius: 2px;
      padding: 0 1px;
      font-style: normal;
    }

    /* アクティブフィルターチップ */
    .active-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    @keyframes chipIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    .chip {
      display: inline-flex;
      align-items: center;
      background: rgba(122, 162, 255, 0.15);
      border: 1px solid rgba(122, 162, 255, 0.5);
      color: var(--accent);
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      width: auto;
      transition: background 0.15s;
      animation: chipIn 0.15s ease;
    }

    .chip:hover { background: rgba(122, 162, 255, 0.3); transform: none; }

/* ── モーダル ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal {
      background: rgba(15,27,54,0.97);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 28px 24px 24px;
      width: min(400px, 90vw);
      max-height: min(90svh, 90vh);
      overflow-y: auto;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      transform: translateY(12px);
      transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-close {
      position: absolute; top: 12px; right: 14px;
      background: none; border: none;
      color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; padding: 4px;
    }
    .modal-close:hover { color: var(--text); }
    .modal-row {
      display: flex; gap: 10px; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--line); font-size: 14px;
    }
    .modal-row:last-child { border-bottom: none; }
    .modal-label { width: 60px; font-size: 11px; font-weight: 700; color: var(--muted); flex-shrink: 0; }
    .modal-value { color: var(--text); font-weight: 600; }
    .modal-opp { display: flex; align-items: center; gap: 8px; }
    .modal-logo { height: 28px; width: auto; object-fit: contain; }

    .going-section {
      display: flex; align-items: center;
      padding: 12px 0 4px; border-top: 1px solid var(--line); margin-top: 4px;
    }
    .going-label {
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; font-size: 15px; font-weight: 700;
      color: var(--text); user-select: none;
    }
    .going-label input[type="checkbox"] {
      appearance: none; -webkit-appearance: none;
      width: 22px; height: 22px;
      border: 2px solid var(--line); border-radius: 5px;
      background: rgba(255,255,255,0.06);
      cursor: pointer; position: relative; flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .going-label input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
    .going-label input[type="checkbox"]:checked::after {
      content: "✓"; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #0b1020; font-size: 14px; font-weight: 900; line-height: 1;
    }
    .memo-section { margin-top: 14px; }
    .memo-label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 6px; }
    .modal-memo {
      width: 100%; padding: 10px 12px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--line);
      border-radius: 8px; color: var(--text); font-size: 13px;
      font-family: inherit; resize: vertical; min-height: 72px;
      outline: none; transition: border-color 0.15s; box-sizing: border-box;
    }
    .modal-memo:focus { border-color: rgba(122,162,255,0.5); }
    .modal-memo::placeholder { color: var(--muted); opacity: 0.6; }
    @media (max-width: 640px) { .modal-memo { font-size: 16px; } }

    /* 行く・メモあり ステータスバッジ */
    .status-badge {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 2px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 700; white-space: nowrap;
    }
    .going-active  { background: rgba(255,80,80,0.15); color: #ff5252; border: 1px solid rgba(255,80,80,0.4); }
    .memo-active   { background: rgba(76,175,80,0.15);   color: #4caf50;       border: 1px solid rgba(76,175,80,0.4); }

    /* PC 専用列 */
    .col-going, .col-memo { width: 90px; text-align: center; }

/* 準備チェックリスト */
    .checklist-section {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px 0 4px;
      border-top: 1px solid var(--line);
    }
    .check-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      user-select: none;
    }
    .check-item input[type="checkbox"] {
      appearance: none; -webkit-appearance: none;
      width: 20px; height: 20px; flex-shrink: 0;
      border: 2px solid var(--line); border-radius: 4px;
      background: rgba(255,255,255,0.06);
      cursor: pointer; position: relative;
      transition: background 0.15s, border-color 0.15s;
    }
    .check-item input[type="checkbox"]:checked { background: #4caf50; border-color: #4caf50; }
    .check-item input[type="checkbox"]:checked::after {
      content: "✓"; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #fff; font-size: 12px; font-weight: 900; line-height: 1;
    }

/* スクロールトップボタン */
    .scroll-top {
      position: fixed;
      bottom: 24px;
      right: 20px;
      width: 44px;
      height: 44px;
      padding: 0;
      border-radius: 50%;
      background: var(--accent);
      color: #0b1020;
      font-size: 20px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    .scroll-top.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    /* デスクトップ: フィルターグリッドを filter-body に移動・トグルボタン表示 */
    @media (min-width: 641px) {
      .filter-header {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        background: none;
        border: none;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        padding: 0 2px 10px;
        letter-spacing: 0.05em;
        text-align: left;
      }
      .filter-header:hover { color: var(--text); }
      .filters { display: block; }
      .filter-body {
        display: grid;
        grid-template-columns: repeat(7, minmax(140px, 1fr));
        gap: 10px;
      }
      .filters.is-collapsed .filter-body { display: none; }
    }

    /* ── レスポンシブ (breakpoints) ── */
    @media (max-width: 1320px) {
      .filters { grid-template-columns: repeat(4, minmax(140px, 1fr)); }
      .filter-body { grid-template-columns: repeat(4, minmax(140px, 1fr)); }
    }

    @media (max-width: 820px) {
      .filters { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
      .filter-body { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
    }

    @media (max-width: 560px) {
      .filters { grid-template-columns: 1fr; }
    }

    /* ── タブレット ── */
    @media (min-width: 641px) and (max-width: 1024px) {
      body { padding: 20px 12px; }
      table { min-width: 660px; }
      thead th:nth-child(1) { width: 110px !important; }
      thead th:nth-child(2) { width: 70px !important; }
      thead th:nth-child(3) { width: 75px !important; }
      .col-going, .col-memo { width: 60px; }
    }

    /* ── モバイル: カードレイアウト ── */
    @media (max-width: 640px) {
      body { padding: 16px 10px; }
      .title { font-size: 1.05rem; }

      /* 入力欄16px未満だとiOSが自動ズームするため16pxに固定 */
      input, select { font-size: 16px; }

      /* フィルターカードを縦積みに */
      .filters { display: flex; flex-direction: column; padding: 0; }

      /* トグルバー */
      .filter-header {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        background: none;
        border: none;
        border-radius: 16px;
        padding: 14px 16px;
        font-size: 14px;
        font-weight: 700;
        color: var(--text);
        cursor: pointer;
        text-align: left;
      }

      .filter-header:hover { background: rgba(255,255,255,0.06); }

      /* アクティブフィルター数バッジ */
      .filter-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--accent);
        color: #0b1020;
        font-size: 11px;
        font-weight: 800;
        border-radius: 999px;
        min-width: 18px;
        height: 18px;
        padding: 0 5px;
      }
      .filter-badge:empty { display: none; }

      /* 矢印 */
      .filter-chevron { margin-left: auto; transition: transform 0.25s ease; font-style: normal; }
      .filters.is-collapsed .filter-chevron { transform: rotate(-90deg); }

      /* 入力欄ラッパー: アコーディオン */
      .filter-body {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 0 14px 14px;
        overflow: hidden;
        max-height: 700px;
        opacity: 1;
        transition: max-height 0.3s ease, opacity 0.2s ease, padding 0.3s ease;
      }

      /* 折りたたみ時 */
      .filters.is-collapsed .filter-body {
        max-height: 0;
        opacity: 0;
        padding-top: 0;
        padding-bottom: 0;
      }

      .table-wrap { padding: 8px; overflow: visible; }

      table { min-width: unset; }
      thead { display: none; }

      tbody tr {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        column-gap: 8px;
        row-gap: 4px;
        margin-bottom: 8px;
        border-radius: 12px;
        border: 1px solid var(--line);
        padding: 12px 8px 12px 14px;
        background: rgba(255, 255, 255, 0.05);
        transform: none !important;
        cursor: pointer;
      }

      tbody tr:hover { background: rgba(255, 255, 255, 0.05); }

      tbody td {
        padding: 0;
        border: none;
        font-size: 13px;
      }

      /* 左上: 日付 */
      .col-date {
        flex: 0 0 auto;
        font-size: 12px;
        color: var(--muted);
      }

      /* 日付の隣: 曜日 */
      .col-day {
        flex: 1 0 auto;
        font-size: 12px;
      }

      /* 右上: HOME/AWAYバッジ */
      .col-kubun {
        flex: 0 0 auto;
        margin-left: auto;
      }

      .col-kubun .badge {
        font-size: 11px;
        padding: 3px 8px;
        min-width: 50px;
      }

      /* 対戦相手: 幅いっぱい・大きく */
      .col-opponent {
        flex: 1 1 100%;
        font-size: 15px;
        font-weight: 700;
        margin-top: 2px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .team-logo { height: 32px; }

      /* 会場: 会場＋バッジを同一行に収める */
      .col-venue {
        flex: 1 1 auto;
        min-width: 0;
        font-size: 12px;
        color: var(--muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* 行く・メモあり バッジ（モバイル）: 会場の右に配置 */
      .col-going {
        flex: 0 0 auto;
        width: 50px;
        padding: 0;
        border: none;
      }
      .col-memo {
        flex: 0 0 auto;
        width: 50px;
        padding: 0;
        border: none;
      }
      .col-going:empty, .col-memo:empty { display: none; }

      /* 月見出しをカード間の区切りとして表示 */
      .month-header {
        display: block !important;
        border: none !important;
        border-radius: 0 !important;
        padding: 0 !important;
        margin-bottom: 0 !important;
        background: transparent !important;
        transform: none !important;
        box-shadow: none !important;
      }
      .month-header td { display: block; padding: 16px 4px 2px; border: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-row">
      <h1 class="title"><img class="title-logo" src="https://bleague.bl.kuroco-img.app/files/user/common/img/logo/2025/s/ub.png" alt="">宇都宮ブレックス <small>2026-2027 スケジュール</small></h1>
      <a class="nav-link" href="calendar.html">カレンダー表示</a>
    </div>

    <div class="card filters" id="filterCard">
      <button class="filter-header" id="filterToggle" aria-expanded="true">
        <span>絞り込み</span>
        <span class="filter-badge" id="filterBadge"></span>
        <span class="filter-chevron">▾</span>
      </button>
      <div class="filter-body">
        <div class="input-wrap">
          <label for="dateFilter">日付</label>
          <input id="dateFilter" type="text" placeholder="日付を選択" />
        </div>

        <div class="input-wrap">
          <label for="dayFilter">曜日</label>
          <select id="dayFilter">
            <option value="">すべて</option>
          </select>
        </div>

        <div class="input-wrap">
          <label for="kubunFilter">区分</label>
          <select id="kubunFilter">
            <option value="">すべて</option>
            <option value="HOME">HOME</option>
            <option value="AWAY">AWAY</option>
          </select>
        </div>

    function parseCSV(csv) {
      const lines = csv.trim().split("\n");
      const headers = lines[0].split(",");
      return lines.slice(1).map(line => {
        const cols = line.split(",");
        const obj = {};
        headers.forEach((h, i) => (obj[h.trim()] = (cols[i] || "").trim()));
        return obj;
      });
    }

    function toInputDate(dateStr) {
      const [y, m, d] = dateStr.split("/").map(Number);
      return `${y}-${String(m).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
    }

    function initDayOptions(data) {
      const exists = new Set(data.map(d => d["曜日"]));
      dayOrder.forEach(day => {
        if (!exists.has(day)) return;
        const option = document.createElement("option");
        option.value = day;
        option.textContent = `${day}（${dayJP[day] || day}）`;
        dayFilter.appendChild(option);
      });
    }

    function highlight(text, query) {
      if (!query) return text;
      const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark class="hl">$1</mark>');
    }

    function renderTable(data, opponentKey = "", venueKey = "") {
      scheduleBody.innerHTML = "";
      resultCount.textContent = `${data.length} 件`;

      if (!data.length) {
        empty.style.display = "block";
        return;
      }
      empty.style.display = "none";

      const monthCount = {};
      data.forEach(row => {
        const [y, m] = row["日付"].split("/").map(Number);
        const k = `${y}/${m}`;
        monthCount[k] = (monthCount[k] || 0) + 1;
      });

      const frag = document.createDocumentFragment();
      let currentMonth = null;

      data.forEach((row, i) => {
        const [y, m] = row["日付"].split("/").map(Number);
        const monthKey = `${y}/${m}`;

        if (monthKey !== currentMonth) {
          currentMonth = monthKey;
          const mtr = document.createElement("tr");
          mtr.className = "month-header";
          mtr.innerHTML = `<td colspan="5">${y}年${m}月 <span style="font-weight:400;margin-left:6px">${monthCount[monthKey]}試合</span></td>`;
          frag.appendChild(mtr);
        }

        const tr = document.createElement("tr");
        tr.dataset.date     = row["日付"];
        tr.dataset.day      = row["曜日"];
        tr.dataset.kubun    = row["区分"];
        tr.dataset.opponent = row["対戦相手"];
        tr.dataset.venue    = row["会場"];

        const day = row["曜日"];
        const kubun = row["区分"];
        const dayClass = day === "SAT" ? "day-sat" : (day === "SUN" || row["日付"] === "2027/2/11") ? "day-sun" : "";
        const oppText = highlight(row["対戦相手"], opponentKey);
        const venueText = highlight(row["会場"], venueKey);

        const going = localStorage.getItem(`brex-going-${row["日付"]}`) === "1";
        const hasMemo = !!localStorage.getItem(`brex-memo-${row["日付"]}`);
        tr.innerHTML = `
          <td class="col-date">${row["日付"]}</td>
          <td class="col-day ${dayClass}">${day}（${dayJP[day] || "-"}）</td>
          <td class="col-kubun"><span class="badge ${kubun === "HOME" ? "home" : "away"}">${kubun}</span></td>
          <td class="col-opponent">${teamLogos[row["対戦相手"]] ? `<img class="team-logo" src="${teamLogos[row["対戦相手"]]}" alt="" loading="lazy" onerror="this.style.display='none'"> ` : ""}${oppText}</td>
          <td class="col-venue">${venueText}</td>
          <td class="col-going">${going ? '<span class="status-badge going-active">行く！</span>' : ''}</td>
          <td class="col-memo">${hasMemo ? '<span class="status-badge memo-active">メモ</span>' : ''}</td>
        `;
        frag.appendChild(tr);
      });

      scheduleBody.appendChild(frag);
    }

    function updateChips() {
      const chips = [];
      if (dateFilter.value) chips.push({ key: "date", label: `日付: ${dateFilter.value}` });
      if (dayFilter.value) chips.push({ key: "day", label: `曜日: ${dayFilter.value}（${dayJP[dayFilter.value] || dayFilter.value}）` });
      if (kubunFilter.value) chips.push({ key: "kubun", label: kubunFilter.value });
      if (opponentFilter.value) chips.push({ key: "opponent", label: `相手: ${opponentFilter.value}` });
      if (venueFilter.value) chips.push({ key: "venue", label: `会場: ${venueFilter.value}` });
      if (seriesOnly.checked) chips.push({ key: "series", label: "連戦のみ" });
      if (goingOnly.checked)  chips.push({ key: "going",  label: "行く！のみ" });
      if (memoOnly.checked)   chips.push({ key: "memo",   label: "メモあり" });
      activeChips.innerHTML = chips.map(c =>
        `<button class="chip" data-key="${c.key}">${c.label} ×</button>`
      ).join("");
    }

const allData = parseCSV(csvData);

    allData.forEach((row, i) => {
      const prev = allData[i - 1];
      const next = allData[i + 1];
      row.__isConsecutiveOpponent =
        (prev && prev["対戦相手"] === row["対戦相手"]) ||
        (next && next["対戦相手"] === row["対戦相手"]);
    });

    const enabledDates = [...new Set(allData.map(row => toInputDate(row["日付"])))];
    let currentFiltered = allData;

    function updateFilterBadge() {
      const count = [
        dateFilter.value,
        dayFilter.value,
        kubunFilter.value,
        opponentFilter.value,
        venueFilter.value,
      ].filter(Boolean).length + (seriesOnly.checked ? 1 : 0) + (goingOnly.checked ? 1 : 0) + (memoOnly.checked ? 1 : 0);
      filterBadge.textContent = count > 0 ? String(count) : "";
    }

    function applyFilter() {
      const dateKey = dateFilter.value;
      const dayKey = dayFilter.value.trim();
      const kubunKey = kubunFilter.value.trim();
      const opponentKey = opponentFilter.value.trim().toLowerCase();
      const venueKey = venueFilter.value.trim().toLowerCase();
      const seriesOnlyKey = seriesOnly.checked;
      const goingOnlyKey  = goingOnly.checked;
      const memoOnlyKey   = memoOnly.checked;

      currentFiltered = allData.filter(row => {
        const okDate   = !dateKey      || toInputDate(row["日付"]) === dateKey;
        const okDay    = !dayKey       || row["曜日"] === dayKey;
        const okKubun  = !kubunKey     || row["区分"] === kubunKey;
        const okOpp    = !opponentKey  || row["対戦相手"].toLowerCase().includes(opponentKey);
        const okVenue  = !venueKey     || row["会場"].toLowerCase().includes(venueKey);
        const okSeries = !seriesOnlyKey || row.__isConsecutiveOpponent;
        const okGoing  = !goingOnlyKey  || localStorage.getItem(`brex-going-${row["日付"]}`) === "1";
        const okMemo   = !memoOnlyKey   || !!localStorage.getItem(`brex-memo-${row["日付"]}`);
        return okDate && okDay && okKubun && okOpp && okVenue && okSeries && okGoing && okMemo;
      });

      renderTable(currentFiltered, opponentKey, venueKey);
      updateFilterBadge();
      updateChips();
    }

    const fp = flatpickr("#dateFilter", {
      dateFormat: "Y-m-d",
      enable: enabledDates,
      allowInput: false,
      disableMobile: true,
      onChange: applyFilter
    });

    [dayFilter, kubunFilter, opponentFilter, venueFilter].forEach(el => {
      el.addEventListener("change", applyFilter);
      el.addEventListener("input", applyFilter);
      el.addEventListener("keydown", e => {
        if (e.key === "Enter") applyFilter();
      });
    });

    seriesOnly.addEventListener("change", applyFilter);
    goingOnly.addEventListener("change", applyFilter);
    memoOnly.addEventListener("change", applyFilter);

    resetBtn.addEventListener("click", () => {
      fp.clear();
      dayFilter.value = "";
      kubunFilter.value = "";
      opponentFilter.value = "";
      venueFilter.value = "";
      seriesOnly.checked = false;
      goingOnly.checked  = false;
      memoOnly.checked   = false;
      currentFiltered = allData;
      renderTable(allData);
      updateFilterBadge();
      updateChips();
    });

    activeChips.addEventListener("click", e => {
      const btn = e.target.closest(".chip");
      if (!btn) return;
      const key = btn.dataset.key;
      if (key === "date") fp.clear();
      else if (key === "day") dayFilter.value = "";
      else if (key === "kubun") kubunFilter.value = "";
      else if (key === "opponent") opponentFilter.value = "";
      else if (key === "venue") venueFilter.value = "";
      else if (key === "series") seriesOnly.checked = false;
      else if (key === "going")  goingOnly.checked  = false;
      else if (key === "memo")   memoOnly.checked   = false;
      applyFilter();
    });

    filterToggle.addEventListener("click", () => {
      const collapsed = filterCard.classList.toggle("is-collapsed");
      filterToggle.setAttribute("aria-expanded", String(!collapsed));
    });

    // ── モーダル ──
    const modalOverlay   = document.getElementById("modalOverlay");
    const memoInput      = document.getElementById("memoInput");
    const goingCheck     = document.getElementById("goingCheck");
    const ticketCheck    = document.getElementById("ticketCheck");
    const hotelCheck     = document.getElementById("hotelCheck");
    const transportCheck = document.getElementById("transportCheck");
    let currentDate    = null;
    let currentMemoKey = null;
    let currentTr      = null;

    function updateRowBadges() {
      if (!currentTr || !currentDate) return;
      const going   = localStorage.getItem(`brex-going-${currentDate}`) === "1";
      const hasMemo = !!localStorage.getItem(`brex-memo-${currentDate}`);
      const goingTd = currentTr.querySelector(".col-going");
      const memoTd  = currentTr.querySelector(".col-memo");
      if (goingTd) goingTd.innerHTML = going   ? '<span class="status-badge going-active">行く！</span>' : '';
      if (memoTd)  memoTd.innerHTML  = hasMemo ? '<span class="status-badge memo-active">メモ</span>'   : '';
    }
    const DAY_JP_MODAL = { MON:"月", TUE:"火", WED:"水", THU:"木", FRI:"金", SAT:"土", SUN:"日" };

    function openModal() {
      const scrollY = window.scrollY;
      document.body.dataset.scrollY = scrollY;
      document.body.style.position = "fixed";
      document.body.style.top = `-${scrollY}px`;
      document.body.style.width = "100%";
      modalOverlay.classList.add("open");
    }
    function closeModal() {
      const scrollY = parseInt(document.body.dataset.scrollY || "0", 10);
      document.body.style.position = "";
      document.body.style.top = "";
      document.body.style.width = "";
      window.scrollTo(0, scrollY);
      modalOverlay.classList.remove("open");
      currentDate    = null;
      currentMemoKey = null;
      currentTr      = null;
    }

    document.getElementById("modalClose").addEventListener("click", closeModal);
    modalOverlay.addEventListener("click", e => { if (e.target === modalOverlay) closeModal(); });
    document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

    goingCheck.addEventListener("change", () => {
      if (!currentDate) return;
      if (goingCheck.checked) {
        localStorage.setItem(`brex-going-${currentDate}`, "1");
      } else {
        if (!confirm("「行く！」チェックを外しますか？")) {
          goingCheck.checked = true;
          return;
        }
        localStorage.removeItem(`brex-going-${currentDate}`);
        localStorage.removeItem(`brex-ticket-${currentDate}`);
        localStorage.removeItem(`brex-hotel-${currentDate}`);
        localStorage.removeItem(`brex-transport-${currentDate}`);
      }
      updateRowBadges();
    });

    ticketCheck.addEventListener("change", () => {
      if (!currentDate) return;
      if (ticketCheck.checked) localStorage.setItem(`brex-ticket-${currentDate}`, "1");
      else localStorage.removeItem(`brex-ticket-${currentDate}`);
    });
    hotelCheck.addEventListener("change", () => {
      if (!currentDate) return;
      if (hotelCheck.checked) localStorage.setItem(`brex-hotel-${currentDate}`, "1");
      else localStorage.removeItem(`brex-hotel-${currentDate}`);
    });
    transportCheck.addEventListener("change", () => {
      if (!currentDate) return;
      if (transportCheck.checked) localStorage.setItem(`brex-transport-${currentDate}`, "1");
      else localStorage.removeItem(`brex-transport-${currentDate}`);
    });

    memoInput.addEventListener("input", () => {
      if (!currentMemoKey) return;
      const val = memoInput.value;
      if (val) localStorage.setItem(currentMemoKey, val);
      else localStorage.removeItem(currentMemoKey);
      updateRowBadges();
    });

    scheduleBody.addEventListener("click", e => {
      const tr = e.target.closest("tr[data-date]");
      if (!tr) return;
      const { date, day, kubun, opponent, venue } = tr.dataset;
      const [y, m, d] = date.split("/");
      const dateLabel = `${y}年${m}月${d}日`;
      const dayLabel  = `${DAY_JP_MODAL[day] || day}（${day}）`;
      const badgeCls  = kubun === "HOME" ? "home" : "away";
      const logo      = teamLogos[opponent] || "";
      document.getElementById("modalBody").innerHTML = `
        <div class="modal-row">
          <span class="modal-label">日付</span>
          <span class="modal-value">${dateLabel}</span>
        </div>
        <div class="modal-row">
          <span class="modal-label">曜日</span>
          <span class="modal-value">${dayLabel}</span>
        </div>
        <div class="modal-row">
          <span class="modal-label">区分</span>
          <span class="modal-value"><span class="badge ${badgeCls}">${kubun}</span></span>
        </div>
        <div class="modal-row">
          <span class="modal-label">対戦相手</span>
          <span class="modal-value modal-opp">
            ${logo ? `<img class="modal-logo" src="${logo}" alt="" onerror="this.style.display='none'">` : ""}
            ${opponent}
          </span>
        </div>
        <div class="modal-row">
          <span class="modal-label">会場</span>
          <span class="modal-value">${venue}</span>
        </div>`;
      currentDate    = date;
      currentMemoKey = `brex-memo-${date}`;
      currentTr      = tr;
      goingCheck.checked     = localStorage.getItem(`brex-going-${date}`) === "1";
      ticketCheck.checked    = localStorage.getItem(`brex-ticket-${date}`) === "1";
      hotelCheck.checked     = localStorage.getItem(`brex-hotel-${date}`) === "1";
      transportCheck.checked = localStorage.getItem(`brex-transport-${date}`) === "1";
      memoInput.value = localStorage.getItem(currentMemoKey) || "";
      openModal();
    });

    window.addEventListener("scroll", () => {
      scrollTopBtn.classList.toggle("visible", window.scrollY > 300);
    }, { passive: true });

    scrollTopBtn.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    if (window.innerWidth <= 640) {
      filterCard.classList.add("is-collapsed");
      filterToggle.setAttribute("aria-expanded", "false");
    }

    initDayOptions(allData);
    renderTable(allData);
    updateChips();
  </script>
</body>
</html>
